# 构建后将 dist 推到 gh-pages 分支
# 仓库 Settings → Pages → Build and deployment → Source：
#   选「Deploy from a branch」→ Branch: gh-pages → Folder: / (root) → Save
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install & build
        run: npm ci && npm run build
        env:
          VITE_BASE: /carshow/

      - name: Push dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
